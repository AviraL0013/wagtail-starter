databases:
  - name: myproject-db
    databaseName: myproject
    user: myproject

services:
  - type: web
    name: myproject
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn myproject.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: myproject-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_SETTINGS_MODULE
        value: myproject.settings.production
      - key: PYTHON_VERSION
        value: 3.12.0